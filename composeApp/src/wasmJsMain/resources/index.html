<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivebit</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        /* Loader styles */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader.hidden {
            display: none;
        }
    </style>
    <script type="application/javascript" src="composeApp.js"></script>
</head>
<body>
    <!-- Loader показывается пока WASM загружается -->
    <div class="loader-container" id="loader">
        <div class="loader"></div>
    </div>
    
    <script>
        // Умный лоадер для WASM
        let wasmLoaded = false;
        let appReady = false;
        
        // Отслеживаем загрузку WASM файлов
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            const url = args[0];
            if (typeof url === 'string' && url.includes('.wasm')) {
                console.log('Loading WASM file:', url);
                return originalFetch.apply(this, args).then(response => {
                    if (response.ok) {
                        wasmLoaded = true;
                        console.log('WASM file loaded successfully');
                        checkIfReady();
                    }
                    return response;
                });
            }
            return originalFetch.apply(this, args);
        };
        
        // Проверяем готовность приложения
        function checkIfReady() {
            if (wasmLoaded && appReady) {
                hideLoader();
            }
        }
        
        // Скрываем лоадер
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 300);
            }
        }
        
        // Отслеживаем когда приложение готово
        window.addEventListener('load', function() {
            appReady = true;
            checkIfReady();
            
            // Fallback - скрываем лоадер через 5 секунд максимум
            setTimeout(() => {
                if (!wasmLoaded) {
                    console.log('WASM loading timeout, hiding loader anyway');
                    hideLoader();
                }
            }, 5000);
        });
    </script>
</body>
</html>
