<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveBit - Аренда автомобилей от собственников</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        /* Loader styles */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader.hidden {
            display: none;
        }
        
        .loader-text {
            margin-top: 20px;
            color: #6b7280;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <!-- Loader показывается пока JS загружается -->
    <div class="loader-container" id="loader">
        <div style="text-align: center;">
            <div class="loader"></div>
            <div class="loader-text">Загрузка DriveBit...</div>
        </div>
    </div>
    
    <script>
        // Простой лоадер для JS (быстрее чем WASM)
        window.addEventListener('load', function() {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.classList.add('hidden');
                    }, 300);
                }
            }, 1000); // Быстрая загрузка JS
        });
    </script>
    
    <!-- Скрипт будет добавлен автоматически Gradle -->
    <script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
