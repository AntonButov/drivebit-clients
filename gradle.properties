# Gradle optimization settings
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.daemon=true

# Build Cache configuration
org.gradle.cache.push=true
org.gradle.cache.pull=true

# Kotlin compilation optimization
kotlin.incremental=true
kotlin.incremental.android.enabled=true
kotlin.incremental.js.enabled=true
kotlin.incremental.native.enabled=true

# Android optimization
android.useAndroidX=true
android.enableJetifier=true
android.enableR8.fullMode=true

# Compose optimization
compose.kotlinCompilerExtensionVersion=1.5.8

# Build performance
kotlin.build.report.enable=true
kotlin.build.report.verbose=true
kotlin.build.report.single_build_file=true

# Memory optimization
kotlin.incremental.multiplatform=true
kotlin.incremental.js.klib=true
kotlin.incremental.js.ir=true

# Parallel execution
kotlin.parallel.tasks.in.project=true
