<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGradient)"/>
  
  <!-- Main icon - stylized "D" for Drivebit -->
  <g transform="translate(256, 256)">
    <!-- Main "D" shape -->
    <path d="M -80 -100 
             L 60 -100 
             Q 80 -100 80 -80 
             L 80 80 
             Q 80 100 60 100 
             L -80 100 
             L -80 -100 Z
             
             M -60 -80 
             L 40 -80 
             Q 50 -80 50 -70 
             L 50 70 
             Q 50 80 40 80 
             L -60 80 
             L -60 -80 Z" 
          fill="url(#iconGradient)" 
          filter="url(#shadow)"
          fill-rule="evenodd"/>
    
    <!-- Drive/disk center circle -->
    <circle cx="0" cy="0" r="30" fill="url(#bgGradient)" stroke="url(#iconGradient)" stroke-width="4"/>
    
    <!-- Small dots representing data -->
    <g fill="url(#iconGradient)">
      <circle cx="-20" cy="-20" r="4"/>
      <circle cx="20" cy="-20" r="4"/>
      <circle cx="20" cy="20" r="4"/>
      <circle cx="-20" cy="20" r="4"/>
    </g>
  </g>
</svg>
