name: JS Development Server Test

on:
  pull_request:
    branches: [ trunk ]
  push:
    branches: [ trunk ]
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  js-development-test:
    name: JS Development Server Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Не запускается на ветке filters
    if: github.ref != 'refs/heads/filters'

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: js-dev-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          js-dev-gradle-
          gradle-

    - name: Cache build outputs
      uses: actions/cache@v4
      with:
        path: |
          build/
          .gradle/
          ~/.gradle/build-cache/
        key: js-dev-build-${{ hashFiles('**/*.kt', '**/*.gradle*') }}
        restore-keys: |
          js-dev-build-
          build-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Make test scripts executable
      run: |
        chmod +x ./test-server-files.sh
        chmod +x ./test-server-files-flexible.sh

    - name: Build JS application first
      run: |
        echo "🔨 Сначала собираем JS приложение..."
        ./gradlew :composeApp:compileKotlinJs --no-daemon --stacktrace
        ./gradlew :composeApp:jsBrowserDevelopmentRun --no-daemon --stacktrace --info &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
      env:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

    - name: Wait for server to start
      run: |
        echo "⏳ Ожидание запуска сервера..."
        sleep 15
        
        # Проверяем что сервер запустился
        SERVER_FOUND=false
        for i in {1..60}; do
          if curl -s --connect-timeout 3 http://localhost:8080 > /dev/null; then
            echo "✅ Сервер запущен на порту 8080"
            SERVER_FOUND=true
            break
          elif curl -s --connect-timeout 3 http://localhost:3000 > /dev/null; then
            echo "✅ Сервер запущен на порту 3000"
            SERVER_FOUND=true
            break
          elif curl -s --connect-timeout 3 http://localhost:8081 > /dev/null; then
            echo "✅ Сервер запущен на порту 8081"
            SERVER_FOUND=true
            break
          else
            echo "⏳ Попытка $i/60: ожидание запуска сервера..."
            sleep 2
          fi
        done
        
        if [ "$SERVER_FOUND" = false ]; then
          echo "❌ Сервер не запустился в течение 2 минут"
          echo "🔍 Проверяем процессы..."
          ps aux | grep gradle || echo "Нет процессов gradle"
          ps aux | grep java || echo "Нет процессов java"
          exit 1
        fi

    - name: Detect server port
      id: detect-port
      run: |
        for port in 8080 3000 8081 8082 8083; do
          if curl -s --connect-timeout 5 http://localhost:$port > /dev/null; then
            echo "port=$port" >> $GITHUB_OUTPUT
            echo "url=http://localhost:$port" >> $GITHUB_OUTPUT
            echo "✅ Обнаружен сервер на порту $port"
            break
          fi
        done
        
        if [ -z "$port" ]; then
          echo "❌ Сервер не обнаружен ни на одном из стандартных портов"
          exit 1
        fi

    - name: Test server files availability
      run: |
        echo "🧪 Тестирование доступности файлов на ${{ steps.detect-port.outputs.url }}"
        ./test-server-files-flexible.sh "${{ steps.detect-port.outputs.url }}"

    - name: Test specific JS and WASM files
      run: |
        SERVER_URL="${{ steps.detect-port.outputs.url }}"
        echo "🔍 Детальная проверка JS и WASM файлов"
        
        # Проверяем composeApp.js
        echo "Проверка composeApp.js:"
        curl -I "$SERVER_URL/composeApp.js" || echo "❌ composeApp.js недоступен"
        
        # Проверяем WASM файлы
        echo "Проверка WASM файлов:"
        curl -I "$SERVER_URL/skiko.wasm" || echo "❌ skiko.wasm недоступен"
        curl -I "$SERVER_URL/skikod8.wasm" || echo "❌ skikod8.wasm недоступен"
        
        # Проверяем размеры файлов
        echo "Размеры файлов:"
        curl -s -I "$SERVER_URL/composeApp.js" | grep -i content-length || echo "❌ Не удалось получить размер composeApp.js"
        curl -s -I "$SERVER_URL/skiko.wasm" | grep -i content-length || echo "❌ Не удалось получить размер skiko.wasm"

    - name: Test file content validation
      run: |
        SERVER_URL="${{ steps.detect-port.outputs.url }}"
        echo "📄 Проверка содержимого файлов"
        
        # Проверяем что composeApp.js содержит JavaScript код
        js_content=$(curl -s "$SERVER_URL/composeApp.js" | head -c 100)
        if [[ "$js_content" == *"function"* ]] || [[ "$js_content" == *"var"* ]] || [[ "$js_content" == *"const"* ]]; then
          echo "✅ composeApp.js содержит корректный JavaScript код"
        else
          echo "❌ composeApp.js не содержит ожидаемый JavaScript код"
          echo "Получено: $js_content"
        fi
        
        # Проверяем что WASM файл имеет корректные магические байты
        wasm_magic=$(curl -s "$SERVER_URL/skiko.wasm" | head -c 4 | hexdump -C | head -1)
        if [[ "$wasm_magic" == *"00 61 73 6d"* ]] || [[ "$wasm_magic" == *"6d 73 61 00"* ]]; then
          echo "✅ skiko.wasm имеет корректные WASM магические байты"
        else
          echo "❌ skiko.wasm не имеет корректные WASM магические байты"
          echo "Получено: $wasm_magic"
        fi

    - name: Test server headers and CORS
      run: |
        SERVER_URL="${{ steps.detect-port.outputs.url }}"
        echo "🌐 Проверка заголовков сервера"
        
        headers=$(curl -s -I "$SERVER_URL")
        echo "Заголовки сервера:"
        echo "$headers"
        
        # Проверяем Content-Type для разных файлов
        echo "Проверка Content-Type:"
        curl -s -I "$SERVER_URL/composeApp.js" | grep -i content-type || echo "❌ Отсутствует Content-Type для JS"
        curl -s -I "$SERVER_URL/skiko.wasm" | grep -i content-type || echo "❌ Отсутствует Content-Type для WASM"
        curl -s -I "$SERVER_URL/index.html" | grep -i content-type || echo "❌ Отсутствует Content-Type для HTML"

    - name: Performance test
      run: |
        SERVER_URL="${{ steps.detect-port.outputs.url }}"
        echo "⚡ Тест производительности загрузки файлов"
        
        # Тестируем время загрузки основных файлов
        for file in "index.html" "composeApp.js" "skiko.wasm"; do
          echo "Тестирование $file:"
          time curl -s -o /dev/null "$SERVER_URL/$file" || echo "❌ Ошибка загрузки $file"
        done

    - name: Cleanup
      if: always()
      run: |
        echo "🧹 Очистка процессов"
        # Останавливаем сервер если он запущен
        if [ ! -z "$SERVER_PID" ]; then
          echo "Останавливаем сервер (PID: $SERVER_PID)"
          kill $SERVER_PID || true
        fi
        # Останавливаем все процессы Gradle
        pkill -f gradle || true
        pkill -f java || true
        sleep 3

    - name: Generate test report
      if: always()
      run: |
        echo "📊 Отчет о тестировании JS Development сервера"
        echo "Сервер URL: ${{ steps.detect-port.outputs.url }}"
        echo "Время выполнения: $(date)"
        echo "Статус: ${{ job.status }}"
