name: iOS Tests

on:
  push:
    branches: [ main, trunk, develop ]
  pull_request:
    branches: [ main, trunk, develop ]

jobs:
  ios-test:
    name: iOS Tests with Simulator
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: List available iOS simulators
      run: |
        xcrun simctl list devices available

    - name: Boot iOS Simulator
      run: |
        # Get the first available iPhone simulator
        SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -o '\[.*\]' | tr -d '[]')
        echo "SIMULATOR_ID=$SIMULATOR_ID" >> $GITHUB_ENV
        echo "Booting simulator: $SIMULATOR_ID"
        xcrun simctl boot $SIMULATOR_ID || true
        xcrun simctl list devices | grep $SIMULATOR_ID

    - name: Wait for simulator to be ready
      run: |
        # Wait for simulator to be fully booted
        timeout 60 bash -c 'until xcrun simctl list devices | grep "$SIMULATOR_ID" | grep "Booted"; do sleep 2; done'
        echo "Simulator is ready!"

    - name: Build iOS framework
      run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --no-daemon

    - name: Run iOS tests
      run: |
        # Run Kotlin/Native tests for iOS
        ./gradlew :composeApp:iosSimulatorArm64Test --no-daemon
        
        # If you have UI tests, you can run them here
        # For example, using XCTest or other iOS testing frameworks

    - name: Take simulator screenshot
      run: |
        # Take a screenshot of the simulator for debugging
        xcrun simctl io $SIMULATOR_ID screenshot simulator-screenshot.png
        echo "Screenshot saved as simulator-screenshot.png"

    - name: Upload simulator screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ios-simulator-screenshot
        path: simulator-screenshot.png

    - name: Shutdown simulator
      if: always()
      run: |
        xcrun simctl shutdown $SIMULATOR_ID || true

  ios-build-test:
    name: iOS Build Test
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build iOS app
      run: |
        # Build the iOS framework
        ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-daemon
        ./gradlew :composeApp:linkReleaseFrameworkIosSimulatorArm64 --no-daemon
        
        # Build the iOS app (if you have an iOS app target)
        # This would require additional setup in your iOS project

    - name: Archive iOS framework
      uses: actions/upload-artifact@v4
      with:
        name: ios-framework
        path: composeApp/build/bin/iosArm64/releaseFramework/
