name: Check (Optimized)

on:
  pull_request:
    branches: [ main, trunk ]
  push:
    branches: [ main, trunk ]

jobs:
  # Быстрая проверка кода (только на Ubuntu)
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: ubuntu-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ubuntu-gradle-
          ubuntu-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Run static analysis only
      run: ./gradlew ktlintCheck detekt --no-daemon --stacktrace --parallel

  # Проверка сборки Android (быстрая)
  build-android-quick:
    name: Build Android (Quick)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quick-check

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: ubuntu-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ubuntu-gradle-
          ubuntu-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Android Debug only
      run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace --parallel

  # Проверка сборки iOS (только на macOS)
  build-ios-quick:
    name: Build iOS (Quick)
    runs-on: macos-latest
    timeout-minutes: 20
    needs: quick-check

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: macos-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          macos-gradle-
          macos-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: macos-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          macos-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build iOS Debug only
      run: ./gradlew :composeApp:linkDebugFrameworkIosArm64 --no-daemon --stacktrace --parallel

  # Проверка WASM (быстрая)
  build-wasm-quick:
    name: Build WASM (Quick)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quick-check

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: ubuntu-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ubuntu-gradle-
          ubuntu-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build WASM only
      run: ./gradlew :composeApp:compileKotlinWasmJs --no-daemon --stacktrace --parallel

  # Полная проверка (только для main/trunk)
  full-check:
    name: Full Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/trunk'
    needs: [build-android-quick, build-ios-quick, build-wasm-quick]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: ubuntu-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ubuntu-gradle-
          ubuntu-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ubuntu-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ubuntu-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Run all tests
      run: ./gradlew test --no-daemon --stacktrace --parallel

    - name: Build all targets
      run: |
        ./gradlew :composeApp:assembleRelease --no-daemon --stacktrace --parallel
        ./gradlew :Storage:assembleRelease --no-daemon --stacktrace --parallel
        ./gradlew :Filters:assembleRelease --no-daemon --stacktrace --parallel

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: full-check-results
        path: |
          composeApp/build/reports/
          composeApp/build/test-results/
          **/build/reports/detekt/
        retention-days: 7
