name: Deploy

on:
  push:
    branches: [ trunk ]
  workflow_run:
    workflows: ["Check"]
    types: [completed]
    branches: [ trunk ]

jobs:
  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build WASM distribution
      run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon

    - name: Test server connection
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          echo "🔍 Testing server connection..."
          echo "✅ Connected to server successfully!"
          echo "🖥️  Server info:"
          uname -a
          echo "📁 Current directory: $(pwd)"
          echo "👤 Current user: $(whoami)"
          echo "🔑 User ID: $(id)"

    - name: Setup Nginx reverse proxy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # Exit on any error
          echo "🔧 Starting Nginx setup..."
          
          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            echo "⚠️  Not running as root, using sudo for system commands"
            SUDO_CMD="sudo"
          else
            echo "✅ Running as root"
            SUDO_CMD=""
          fi
          
          # Install Nginx if not installed
          if ! command -v nginx >/dev/null 2>&1; then
            echo "📦 Installing Nginx..."
            $SUDO_CMD apt update
            $SUDO_CMD apt install -y nginx
            echo "✅ Nginx installed successfully"
          else
            echo "✅ Nginx already installed"
          fi
          
          # Create Nginx configuration directory if it doesn't exist
          $SUDO_CMD mkdir -p /etc/nginx/sites-available
          $SUDO_CMD mkdir -p /etc/nginx/sites-enabled
          
          # Create Nginx configuration for port 80
          echo "📝 Creating Nginx configuration..."
          $SUDO_CMD tee /etc/nginx/sites-available/drivebit-clients > /dev/null << 'EOF'
          server {
              listen 80;
              server_name ${{ secrets.SERVER_DOMAIN || secrets.SERVER_HOST }};
              root /var/www/drivebit-clients;
              index index.html;
              
              location / {
                  try_files \$uri \$uri/ /index.html;
              }
              
              # Enable gzip compression
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
              
              # Cache static assets
              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }
          }
          EOF
          
          # Enable the site
          echo "🔗 Enabling Nginx site..."
          $SUDO_CMD ln -sf /etc/nginx/sites-available/drivebit-clients /etc/nginx/sites-enabled/
          $SUDO_CMD rm -f /etc/nginx/sites-enabled/default
          
          # Test and reload Nginx
          echo "🧪 Testing Nginx configuration..."
          $SUDO_CMD nginx -t
          echo "🔄 Reloading Nginx..."
          $SUDO_CMD systemctl reload nginx
          echo "✅ Nginx setup completed successfully!"

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # Exit on any error
          echo "🚀 Starting deployment preparation..."
          
          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            echo "⚠️  Not running as root, using sudo for system commands"
            SUDO_CMD="sudo"
          else
            echo "✅ Running as root"
            SUDO_CMD=""
          fi
          
          # Create backup of current deployment
          if [ -d "/var/www/drivebit-clients" ]; then
            echo "💾 Creating backup of current deployment..."
            $SUDO_CMD cp -r /var/www/drivebit-clients /var/www/drivebit-clients.backup.$(date +%Y%m%d_%H%M%S)
            echo "✅ Backup created successfully"
          else
            echo "ℹ️  No existing deployment found, skipping backup"
          fi
          
          # Create deployment directory if it doesn't exist
          echo "📁 Creating deployment directory..."
          $SUDO_CMD mkdir -p /var/www/drivebit-clients
          $SUDO_CMD chown -R $USER:$USER /var/www/drivebit-clients
          echo "✅ Deployment directory prepared"

    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "composeApp/build/dist/wasmJs/productionExecutable/"
        target: "/var/www/drivebit-clients"
        strip_components: 0

    - name: Set permissions and reload Nginx
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # Exit on any error
          echo "🔐 Setting up final permissions and reloading Nginx..."
          
          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            echo "⚠️  Not running as root, using sudo for system commands"
            SUDO_CMD="sudo"
          else
            echo "✅ Running as root"
            SUDO_CMD=""
          fi
          
          # Set proper permissions
          echo "📋 Setting file permissions..."
          $SUDO_CMD chown -R www-data:www-data /var/www/drivebit-clients
          $SUDO_CMD chmod -R 755 /var/www/drivebit-clients
          echo "✅ Permissions set successfully"
          
          # Reload Nginx to serve new files
          echo "🔄 Reloading Nginx to serve new files..."
          $SUDO_CMD systemctl reload nginx
          echo "📊 Checking Nginx status..."
          $SUDO_CMD systemctl status nginx --no-pager
          echo "✅ Nginx reloaded and running successfully!"

    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "🌐 App deployed to: http://${{ secrets.SERVER_DOMAIN || secrets.SERVER_HOST }}"

    - name: Notify deployment failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "Check the logs above for details."
