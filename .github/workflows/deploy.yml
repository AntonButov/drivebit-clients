name: Deploy

on:
  push:
    branches: [ trunk ]
  workflow_run:
    workflows: ["Check"]
    types: [completed]
    branches: [ trunk ]

jobs:
  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build WASM distribution
      run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon

    - name: Install brotli
      run: sudo apt-get update && sudo apt-get install -y brotli

    - name: Precompress assets (gzip + brotli)
      run: |
        set -e
        DIST=composeApp/build/dist/wasmJs/productionExecutable
        echo "Compressing assets in $DIST"
        find "$DIST" -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.css' \) -print0 \
          | xargs -0 -I{} bash -lc "gzip -f -k -9 '{}' && brotli -f -Z '{}' || true"

    - name: Show built index.html title
      run: |
        echo "Built index.html header preview:" && \
        head -n 15 composeApp/build/dist/wasmJs/productionExecutable/index.html | sed -n '1,15p'

    - name: Test server connection
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          echo "🔍 Testing server connection..."
          echo "✅ Connected to server successfully!"
          echo "🖥️  Server info:"
          uname -a
          echo "📁 Current directory: $(pwd)"
          echo "👤 Current user: $(whoami)"
          echo "🔑 User ID: $(id)"

    - name: Prepare deployment directory (clean target)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # Exit on any error
          echo "🚀 Preparing deployment directory..."
          
          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            echo "⚠️  Not running as root, using sudo for system commands"
            SUDO_CMD="sudo"
          else
            echo "✅ Running as root"
            SUDO_CMD=""
          fi
          
          # Create backup of current deployment
          if [ -d "/var/www/drivebit-clients" ]; then
            echo "💾 Creating backup of current deployment..."
            $SUDO_CMD cp -r /var/www/drivebit-clients /var/www/drivebit-clients.backup.$(date +%Y%m%d_%H%M%S)
            echo "✅ Backup created successfully"
            echo "🧹 Cleaning current deployment contents..."
            $SUDO_CMD rm -rf /var/www/drivebit-clients/*
            echo "✅ Cleaned"
          else
            echo "ℹ️  No existing deployment found, skipping backup"
          fi
          
          # Create deployment directory if it doesn't exist
          echo "📁 Creating deployment directory..."
          $SUDO_CMD mkdir -p /var/www/drivebit-clients
          $SUDO_CMD chown -R $USER:$USER /var/www/drivebit-clients
          echo "✅ Deployment directory prepared"

    - name: Copy files to server (upload built assets)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "composeApp/build/dist/wasmJs/productionExecutable/*"
        target: "/var/www/drivebit-clients"
        strip_components: 0
        overwrite: true

    - name: Fix file structure (move files to correct location)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          echo "🔧 Fixing file structure..."
          if [ "$EUID" -ne 0 ]; then SUDO_CMD="sudo"; else SUDO_CMD=""; fi
          
          # Move files from nested structure to root if needed
          if [ -d "/var/www/drivebit-clients/composeApp/build/dist/wasmJs/productionExecutable" ]; then
            echo "📁 Moving files from nested structure..."
            $SUDO_CMD mv /var/www/drivebit-clients/composeApp/build/dist/wasmJs/productionExecutable/* /var/www/drivebit-clients/
            $SUDO_CMD rm -rf /var/www/drivebit-clients/composeApp
            echo "✅ Files moved to correct location"
          else
            echo "ℹ️  Files already in correct location"
          fi
          
          # Verify index.html exists
          if [ -f "/var/www/drivebit-clients/index.html" ]; then
            echo "✅ index.html found in correct location"
          else
            echo "❌ index.html not found!"
            exit 1
          fi

    - name: Set file permissions
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # Exit on any error
          echo "🔐 Setting file permissions..."
          
          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            echo "⚠️  Not running as root, using sudo for system commands"
            SUDO_CMD="sudo"
          else
            echo "✅ Running as root"
            SUDO_CMD=""
          fi
          
          # Set proper permissions
          echo "📋 Setting file permissions..."
          $SUDO_CMD chown -R $USER:$USER /var/www/drivebit-clients
          $SUDO_CMD chmod -R 755 /var/www/drivebit-clients
          echo "✅ Permissions set successfully"
          
          # List deployed files
          echo "📁 Deployed files:"
          ls -la /var/www/drivebit-clients/
          echo "✅ Deployment completed successfully!"

    - name: Enable nginx static compression (gzip_static, wasm type)
      continue-on-error: true
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          if [ "$EUID" -ne 0 ]; then SUDO_CMD="sudo"; else SUDO_CMD=""; fi
          CFG="/etc/nginx/conf.d/drivebit_static.conf"
          echo "⚙️  Ensuring nginx static compression settings in $CFG"
          $SUDO_CMD bash -lc "cat > $CFG <<'CONF'\n# drivebit static compression\ngzip_static on;\n# ensure wasm MIME present (in case not in mime.types)\ntypes { application/wasm wasm; }\nCONF"
          $SUDO_CMD nginx -t
          $SUDO_CMD systemctl reload nginx

    - name: Verify deployed page title
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          test -f /var/www/drivebit-clients/index.html || (echo "❌ index.html missing after upload" && exit 1)
          grep -o '<title>[^<]*' -m1 /var/www/drivebit-clients/index.html || true

    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "📁 Files deployed to: /var/www/drivebit-clients/"
        echo "🌐 Application is now live at: http://${{ secrets.SERVER_DOMAIN || secrets.SERVER_HOST }}/"
        echo "🔧 Nginx configured and serving the application"

    - name: Notify deployment failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "Check the logs above for details."
