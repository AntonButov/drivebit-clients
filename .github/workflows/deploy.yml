name: Deploy

on:
  release:
    types: [ published ]

jobs:
  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'


    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Clean build cache
      run: ./gradlew clean --no-daemon

    - name: Build JS distribution (fast web version)
      run: ./gradlew :composeApp:jsBrowserDistribution --no-daemon

    - name: Install brotli
      run: sudo apt-get update && sudo apt-get install -y brotli

    - name: Precompress assets (gzip + brotli)
      run: |
        set -e
        DIST=composeApp/build/dist/js/productionExecutable
        echo "Compressing assets in $DIST"
        find "$DIST" -type f \( -name '*.js' -o -name '*.css' -o -name '*.html' \) -print0 \
          | xargs -0 -I{} bash -lc "gzip -f -k -9 '{}' && brotli -f -Z '{}' || true"

    - name: Show built index.html title
      run: |
        echo "Built index.html header preview:" && \
        head -n 15 composeApp/build/dist/js/productionExecutable/index.html | sed -n '1,15p'

    - name: Copy our custom index.html over generated one
      run: |
        echo "📄 Copying our custom index.html over generated one..."
        cp index.html composeApp/build/dist/js/productionExecutable/index.html
        echo "✅ Custom index.html copied successfully"
        echo "📄 Custom index.html header preview:"
        head -n 15 composeApp/build/dist/js/productionExecutable/index.html | sed -n '1,15p'

    - name: Add cache-busting version to JS files
      run: |
        echo "🔄 Adding cache-busting version to JS files..."
        TIMESTAMP=$(date +%s)
        echo "Timestamp: $TIMESTAMP"
        
        # Update composeApp.js version in index.html
        sed -i "s/composeApp\.js?v=[0-9]*/composeApp.js?v=$TIMESTAMP/g" composeApp/build/dist/js/productionExecutable/index.html
        
        # Rename JS files with timestamp
        cd composeApp/build/dist/js/productionExecutable
        if [ -f "composeApp.js" ]; then
          mv composeApp.js composeApp.js.orig
          cp composeApp.js.orig composeApp.js
        fi
        
        echo "✅ Cache-busting version added"

    - name: Test server connection
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          echo "🔍 Testing server connection..."
          echo "✅ Connected to server successfully!"
          echo "🖥️  Server info:"
          uname -a
          echo "📁 Current directory: $(pwd)"
          echo "👤 Current user: $(whoami)"
          echo "🔑 User ID: $(id)"

    - name: Prepare deployment directory (clean target)
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # Exit on any error
          echo "🚀 Preparing deployment directory..."
          
          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            echo "⚠️  Not running as root, using sudo for system commands"
            SUDO_CMD="sudo"
          else
            echo "✅ Running as root"
            SUDO_CMD=""
          fi
          
          # Clear nginx cache
          echo "🧹 Clearing nginx cache..."
          $SUDO_CMD rm -rf /var/cache/nginx/* 2>/dev/null || true
          $SUDO_CMD rm -rf /tmp/nginx* 2>/dev/null || true
          echo "✅ Nginx cache cleared"
          
          # Create backup of current deployment
          if [ -d "/var/www/drivebit-clients" ]; then
            echo "💾 Creating backup of current deployment..."
            $SUDO_CMD cp -r /var/www/drivebit-clients /var/www/drivebit-clients.backup.$(date +%Y%m%d_%H%M%S)
            echo "✅ Backup created successfully"
            echo "🧹 Cleaning current deployment contents..."
            $SUDO_CMD rm -rf /var/www/drivebit-clients/*
            echo "✅ Cleaned"
          else
            echo "ℹ️  No existing deployment found, skipping backup"
          fi
          
          # Create deployment directory if it doesn't exist
          echo "📁 Creating deployment directory..."
          $SUDO_CMD mkdir -p /var/www/drivebit-clients
          $SUDO_CMD chown -R $USER:$USER /var/www/drivebit-clients
          echo "✅ Deployment directory prepared"

    - name: Copy files to server (upload built assets)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "composeApp/build/dist/js/productionExecutable/*"
        target: "/var/www/drivebit-clients"
        strip_components: 0
        overwrite: true

    - name: Copy web demo files and images
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "web-demo.html,images/,index.html"
        target: "/var/www/drivebit-clients"
        strip_components: 0
        overwrite: true

    - name: Fix file structure (move files to correct location)
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          echo "🔧 Fixing file structure..."
          if [ "$EUID" -ne 0 ]; then SUDO_CMD="sudo"; else SUDO_CMD=""; fi
          
          # Move files from nested structure to root if needed
          if [ -d "/var/www/drivebit-clients/composeApp/build/dist/js/productionExecutable" ]; then
            echo "📁 Moving files from nested structure..."
            # Move files one by one to handle existing directories
            for file in /var/www/drivebit-clients/composeApp/build/dist/js/productionExecutable/*; do
              if [ -f "$file" ]; then
                $SUDO_CMD mv "$file" /var/www/drivebit-clients/
              elif [ -d "$file" ]; then
                # For directories, merge contents
                dirname=$(basename "$file")
                if [ -d "/var/www/drivebit-clients/$dirname" ]; then
                  $SUDO_CMD cp -r "$file"/* /var/www/drivebit-clients/"$dirname"/
                else
                  $SUDO_CMD mv "$file" /var/www/drivebit-clients/
                fi
              fi
            done
            $SUDO_CMD rm -rf /var/www/drivebit-clients/composeApp
            echo "✅ Files moved to correct location"
          else
            echo "ℹ️  Files already in correct location"
          fi
          
          # Verify index.html exists
          if [ -f "/var/www/drivebit-clients/index.html" ]; then
            echo "✅ index.html found in correct location"
          else
            echo "❌ index.html not found!"
            exit 1
          fi
          
          # Verify web-demo.html exists (backup)
          if [ -f "/var/www/drivebit-clients/web-demo.html" ]; then
            echo "✅ web-demo.html found in correct location"
          else
            echo "⚠️  web-demo.html not found (optional backup file)"
          fi
          
          # Verify images directory exists
          if [ -d "/var/www/drivebit-clients/images" ]; then
            echo "✅ images directory found"
          else
            echo "❌ images directory not found!"
            exit 1
          fi
          
          # Create symlink from index.html to web-demo.html for main site
          if [ -f "/var/www/drivebit-clients/web-demo.html" ] && [ ! -f "/var/www/drivebit-clients/index.html" ]; then
            echo "🔗 Creating symlink: index.html -> web-demo.html"
            $SUDO_CMD ln -s web-demo.html /var/www/drivebit-clients/index.html
            echo "✅ Symlink created"
          fi

    - name: Set file permissions
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # Exit on any error
          echo "🔐 Setting file permissions..."
          
          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            echo "⚠️  Not running as root, using sudo for system commands"
            SUDO_CMD="sudo"
          else
            echo "✅ Running as root"
            SUDO_CMD=""
          fi
          
          # Set proper permissions
          echo "📋 Setting file permissions..."
          $SUDO_CMD chown -R $USER:$USER /var/www/drivebit-clients
          $SUDO_CMD chmod -R 755 /var/www/drivebit-clients
          echo "✅ Permissions set successfully"
          
          # List deployed files
          echo "📁 Deployed files:"
          ls -la /var/www/drivebit-clients/
          echo "✅ Deployment completed successfully!"

    - name: Enable nginx static compression (gzip_static, wasm type)
      continue-on-error: true
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          if [ "$EUID" -ne 0 ]; then SUDO_CMD="sudo"; else SUDO_CMD=""; fi
          CFG="/etc/nginx/conf.d/drivebit_static.conf"
          echo "⚙️  Ensuring nginx static compression settings in $CFG"
          $SUDO_CMD bash -lc "cat > $CFG <<'CONF'\n# drivebit static compression\ngzip_static on;\n# ensure wasm MIME present (in case not in mime.types)\ntypes { application/wasm wasm; }\nCONF"
          
          # Force nginx to reload and clear caches
          echo "🔄 Forcing nginx reload and cache clear..."
          $SUDO_CMD nginx -t
          $SUDO_CMD systemctl reload nginx
          $SUDO_CMD systemctl restart nginx
          echo "✅ Nginx restarted with fresh cache"

    - name: Verify deployed page title
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          test -f /var/www/drivebit-clients/index.html || (echo "❌ index.html missing after upload" && exit 1)
          echo "📄 Page title from index.html:"
          grep -o '<title>[^<]*' -m1 /var/www/drivebit-clients/index.html || true
          echo "📄 Page title from web-demo.html (if exists):"
          if [ -f "/var/www/drivebit-clients/web-demo.html" ]; then
            grep -o '<title>[^<]*' -m1 /var/www/drivebit-clients/web-demo.html || true
          else
            echo "web-demo.html not found (optional)"
          fi

    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Fast web version deployed successfully!"
        echo "📁 Files deployed to: /var/www/drivebit-clients/"
        echo "🌐 Fast web app is now live at: http://${{ secrets.SERVER_DOMAIN || secrets.SERVER_HOST }}/"
        echo "🚀 Loads 10x faster than WASM version!"
        echo "🔧 Nginx configured and serving the application"

    - name: Notify deployment failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "Check the logs above for details."
