name: Test GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Create test page
      run: |
        echo "📦 Creating test page..."
        mkdir -p pages_build
        
        cat > pages_build/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <title>DriveBit Test Page</title>
            <style>
                body { font-family: Arial, sans-serif; margin: 40px; }
                .success { color: green; font-size: 24px; }
                .info { color: blue; margin: 20px 0; }
            </style>
        </head>
        <body>
            <h1 class="success">✅ GitHub Pages Test Successful!</h1>
            <div class="info">
                <p><strong>Repository:</strong> drivebit-clients</p>
                <p><strong>Branch:</strong> github-pages-setup</p>
                <p><strong>Deployment Time:</strong> $(date)</p>
                <p><strong>Test ID:</strong> ${{ github.run_id }}</p>
            </div>
            <h2>Next Steps:</h2>
            <ul>
                <li>✅ GitHub Pages is working</li>
                <li>🔄 Now deploy the actual app</li>
                <li>🎉 Your site will be live!</li>
            </ul>
        </body>
        </html>
        EOF
        
        touch pages_build/.nojekyll
        
        echo "📁 Test files created:"
        ls -la pages_build/

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'pages_build'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Success notification
      run: |
        echo "✅ Test deployment successful!"
        echo "🌐 Test URL: ${{ steps.deployment.outputs.page_url }}"
