name: Fast Check

on:
  pull_request:
    branches: [ trunk ]
  push:
    branches: [ trunk ]

jobs:
  # Супер-быстрая проверка (только самое важное)
  fast-check:
    name: Fast Check
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: fast-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          fast-gradle-
          gradle-

    - name: Cache build outputs
      uses: actions/cache@v4
      with:
        path: |
          build/
          .gradle/
          ~/.gradle/build-cache/
        key: fast-build-${{ hashFiles('**/*.kt', '**/*.gradle*') }}
        restore-keys: |
          fast-build-
          build-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Quick static analysis
      run: ./gradlew ktlintCheck --no-daemon --stacktrace --parallel

    - name: Quick Android builds (all modules)
      run: ./gradlew compileDebugKotlinAndroid --no-daemon --stacktrace --parallel

    - name: Quick JS builds (all modules)
      run: ./gradlew compileKotlinJs --no-daemon --stacktrace --parallel

  # iOS проверка (только на macOS, параллельно)
  ios-check:
    name: iOS Check
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: macos-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          macos-gradle-
          gradle-

    - name: Cache build outputs
      uses: actions/cache@v4
      with:
        path: |
          build/
          .gradle/
          ~/.gradle/build-cache/
        key: macos-build-${{ hashFiles('**/*.kt', '**/*.gradle*') }}
        restore-keys: |
          macos-build-
          build-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: macos-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          macos-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Quick iOS builds (all modules)
      run: ./gradlew compileKotlinIosArm64 --no-daemon --stacktrace --parallel

    - name: Quick iOS Simulator builds (all modules)
      run: ./gradlew compileKotlinIosSimulatorArm64 --no-daemon --stacktrace --parallel

  # Параллельная проверка модулей (каждый модуль - отдельная джоба)
  check-modules:
    name: Check ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module:
          - Storage
          - Splash
          - Mobile
          - Auth
          - UI-Components
          - CommonViewModels
          - composeApp

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: check-gradle-${{ matrix.module }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          check-gradle-${{ matrix.module }}-
          gradle-

    - name: Cache build outputs
      uses: actions/cache@v4
      with:
        path: |
          build/
          .gradle/
          ~/.gradle/build-cache/
        key: check-build-${{ matrix.module }}-${{ hashFiles('**/*.kt', '**/*.gradle*') }}
        restore-keys: |
          check-build-${{ matrix.module }}-
          build-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Check ${{ matrix.module }}
      run: ./gradlew :${{ matrix.module }}:check --no-daemon --stacktrace
