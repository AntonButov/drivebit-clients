name: Check

on:
  pull_request:
    branches: [ main, trunk ]
  push:
    branches: [ main, trunk ]

jobs:
  # Проверка кода и тестов
  check:
    name: Check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Run checks
      run: ./gradlew check --no-daemon --stacktrace -x testDebugUnitTest -x testReleaseUnitTest

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: check-results-${{ matrix.os }}
        path: |
          composeApp/build/reports/
          composeApp/build/test-results/
        retention-days: 7

  # Проверка сборки Android таргетов
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Android Debug
      run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace

    - name: Build Android Release
      run: ./gradlew :composeApp:assembleRelease --no-daemon --stacktrace

    - name: Build all Android modules
      run: ./gradlew :Storage:assembleDebug :Storage:assembleRelease :Filters:assembleDebug :Filters:assembleRelease :Mobile:assembleDebug :Mobile:assembleRelease :Splash:assembleDebug :Splash:assembleRelease --no-daemon --stacktrace

  # Проверка сборки iOS таргетов (только на macOS)
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Kotlin/Native dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build iOS frameworks
      run: ./gradlew :composeApp:linkDebugFrameworkIosArm64 :composeApp:linkDebugFrameworkIosSimulatorArm64 :composeApp:linkReleaseFrameworkIosArm64 :composeApp:linkReleaseFrameworkIosSimulatorArm64 --no-daemon --stacktrace

    - name: Build all iOS modules
      run: ./gradlew :Storage:linkDebugFrameworkIosArm64 :Storage:linkDebugFrameworkIosSimulatorArm64 :Filters:linkDebugFrameworkIosArm64 :Filters:linkDebugFrameworkIosSimulatorArm64 :Mobile:linkDebugFrameworkIosArm64 :Mobile:linkDebugFrameworkIosSimulatorArm64 :Splash:linkDebugFrameworkIosArm64 :Splash:linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace

  # Проверка сборки WASM таргетов
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build WASM
      run: ./gradlew :composeApp:wasmJsBrowserDevelopmentRun --no-daemon --stacktrace

    - name: Build WASM modules
      run: ./gradlew :Storage:wasmJsBrowserDevelopmentRun :Filters:wasmJsBrowserDevelopmentRun --no-daemon --stacktrace

  # Проверка сборки JS таргетов
  build-js:
    name: Build JS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build JS modules
      run: ./gradlew :Storage:jsBrowserDevelopmentRun :Filters:jsBrowserDevelopmentRun --no-daemon --stacktrace


