name: Test All Platforms

on:
  push:
    branches: [ main, trunk, develop ]
  pull_request:
    branches: [ main, trunk, develop ]

jobs:
  # Common tests that run on all platforms
  common-tests:
    name: Common Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Run common tests
      run: ./gradlew :composeApp:allTests --no-daemon

  # Android tests with emulator
  android-tests:
    name: Android Tests
    runs-on: ubuntu-latest
    needs: common-tests
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Run Android tests with emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        script: |
          # Build and test
          ./gradlew :composeApp:assembleDebug :composeApp:connectedDebugAndroidTest --no-daemon
          
          # Take screenshot
          adb shell screencap -p /sdcard/screenshot.png
          adb pull /sdcard/screenshot.png android-screenshot.png

    - name: Upload Android screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-screenshot
        path: android-screenshot.png

  # iOS tests with simulator
  ios-tests:
    name: iOS Tests
    runs-on: macos-latest
    needs: common-tests
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Boot iOS Simulator and run tests
      run: |
        # Get available simulator
        SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -o '\[.*\]' | tr -d '[]')
        echo "SIMULATOR_ID=$SIMULATOR_ID" >> $GITHUB_ENV
        
        # Boot simulator
        xcrun simctl boot $SIMULATOR_ID || true
        timeout 60 bash -c 'until xcrun simctl list devices | grep "$SIMULATOR_ID" | grep "Booted"; do sleep 2; done'
        
        # Run iOS tests
        ./gradlew :composeApp:iosSimulatorArm64Test --no-daemon
        
        # Take screenshot
        xcrun simctl io $SIMULATOR_ID screenshot ios-screenshot.png
        
        # Shutdown
        xcrun simctl shutdown $SIMULATOR_ID || true

    - name: Upload iOS screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ios-screenshot
        path: ios-screenshot.png

  # Web/WASM tests
  web-tests:
    name: Web/WASM Tests
    runs-on: ubuntu-latest
    needs: common-tests
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Run Web/WASM tests
      run: ./gradlew :composeApp:wasmJsTest --no-daemon

    - name: Build Web distribution
      run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon

    - name: Upload Web build
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: composeApp/build/dist/wasmJs/productionExecutable/

  # Summary job
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [common-tests, android-tests, ios-tests, web-tests]
    if: always()
    
    steps:
    - name: Test Results Summary
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Common Tests | ${{ needs.common-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Android Tests | ${{ needs.android-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| iOS Tests | ${{ needs.ios-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Web/WASM Tests | ${{ needs.web-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
