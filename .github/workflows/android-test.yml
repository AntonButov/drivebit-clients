name: Android Tests

on:
  push:
    branches: [ main, trunk, develop ]
  pull_request:
    branches: [ main, trunk, develop ]

jobs:
  android-test:
    name: Android Tests with Emulator
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk-version: 25.1.8937393

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Android dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.android/build-cache
          ~/.android/cache
        key: ${{ runner.os }}-android-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-android-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Create AVD
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        script: |
          # List available emulators
          emulator -list-avds
          
          # Build the Android app
          ./gradlew :composeApp:assembleDebug --no-daemon
          
          # Install the app on the emulator
          adb install composeApp/build/outputs/apk/debug/composeApp-debug.apk
          
          # Run Android tests
          ./gradlew :composeApp:connectedDebugAndroidTest --no-daemon
          
          # Take a screenshot
          adb shell screencap -p /sdcard/screenshot.png
          adb pull /sdcard/screenshot.png emulator-screenshot.png

    - name: Upload emulator screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-emulator-screenshot
        path: emulator-screenshot.png

  android-build-test:
    name: Android Build Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Android APK
      run: |
        # Build debug APK
        ./gradlew :composeApp:assembleDebug --no-daemon
        
        # Build release APK
        ./gradlew :composeApp:assembleRelease --no-daemon

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: |
          composeApp/build/outputs/apk/debug/
          composeApp/build/outputs/apk/release/
