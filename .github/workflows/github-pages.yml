name: Deploy to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build JS Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18'

    - name: Cache Node modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules/
          **/node_modules/
        key: node-modules-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
        restore-keys: |
          node-modules-

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: pages-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          pages-gradle-
          gradle-

    - name: Cache build outputs
      uses: actions/cache@v4
      with:
        path: |
          build/
          .gradle/
          ~/.gradle/build-cache/
        key: pages-build-${{ hashFiles('**/*.kt', '**/*.gradle*') }}
        restore-keys: |
          pages-build-
          build-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build JS distribution
      run: ./gradlew :composeApp:jsBrowserDistribution --no-daemon

    - name: Prepare GitHub Pages content
      run: |
        set -e
        echo "📦 Preparing GitHub Pages content..."
        
        DIST_DIR="composeApp/build/dist/js/productionExecutable"
        PAGES_DIR="pages_build"
        
        echo "🔍 Checking if build directory exists..."
        if [ ! -d "$DIST_DIR" ]; then
          echo "❌ Build directory not found: $DIST_DIR"
          echo "📁 Available directories:"
          find composeApp/build -type d -name "*dist*" 2>/dev/null || echo "No dist directories found"
          exit 1
        fi
        
        echo "✅ Build directory found"
        mkdir -p "$PAGES_DIR"
        
        echo "📂 Copying built files..."
        cp -r "$DIST_DIR"/* "$PAGES_DIR"/
        
        echo "📄 Copying custom index.html..."
        if [ -f "index.html" ]; then
          cp index.html "$PAGES_DIR"/index.html
          echo "✅ Custom index.html copied"
        else
          echo "⚠️ index.html not found in root, using generated one"
        fi
        
        echo "🖼️ Copying images..."
        if [ -d "images" ]; then
          cp -r images "$PAGES_DIR"/
          echo "✅ Images copied"
        else
          echo "⚠️ Images directory not found"
        fi
        
        if [ -f "web-demo.html" ]; then
          cp web-demo.html "$PAGES_DIR"/
          echo "✅ web-demo.html copied"
        fi
        
        echo "🚫 Adding .nojekyll file..."
        touch "$PAGES_DIR/.nojekyll"
        
        echo "📊 Adding cache-busting version..."
        TIMESTAMP=$(date +%s)
        sed -i "s/composeApp\.js?v=[0-9]*/composeApp.js?v=$TIMESTAMP/g" "$PAGES_DIR/index.html"
        
        echo "✅ Content prepared"
        echo "📁 Files in pages_build:"
        ls -la "$PAGES_DIR"
        
        echo "🔍 Verifying index.html exists..."
        if [ -f "$PAGES_DIR/index.html" ]; then
          echo "✅ index.html exists"
          echo "📄 First few lines of index.html:"
          head -5 "$PAGES_DIR/index.html"
        else
          echo "❌ index.html not found in pages_build!"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'pages_build'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Successfully deployed to GitHub Pages!"
          echo "🌐 Your site is available at: ${{ steps.deployment.outputs.page_url }}"

