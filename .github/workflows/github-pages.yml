name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: pages-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          pages-gradle-
          gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build JS distribution
      run: |
        echo "🔨 Building JS distribution..."
        ./gradlew :composeApp:jsBrowserDistribution --no-daemon
        echo "✅ Build completed"

    - name: Prepare dist directory
      run: |
        echo "📦 Preparing dist directory..."

        # Create dist directory
        mkdir -p dist

        # Copy built files
        cp -r composeApp/build/dist/js/productionExecutable/* dist/

        if [ -d "images" ]; then
          cp -r images dist/
          echo "✅ Copied images"
        fi

        # Add .nojekyll
        touch dist/.nojekyll

        echo "📁 Dist files:"
        ls -la dist/

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: 'dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Success notification
      run: |
        echo "✅ Successfully deployed to gh-pages branch!"
        echo "🌐 Your site will be available at: https://antonbutov.github.io/drivebit-clients/"
