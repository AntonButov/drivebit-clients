name: Deploy to GitHub Pages (Simple)

on:
  push:
    branches: [ github-pages-setup, trunk, main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: pages-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          pages-gradle-
          gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build JS distribution
      run: ./gradlew :composeApp:jsBrowserDistribution --no-daemon

    - name: Prepare deployment
      run: |
        echo "📦 Preparing deployment..."
        
        # Create deployment directory
        mkdir -p pages_build
        
        # Copy built files
        cp -r composeApp/build/dist/js/productionExecutable/* pages_build/
        
        # Copy custom files
        if [ -f "index.html" ]; then
          cp index.html pages_build/
          echo "✅ Copied custom index.html"
        fi
        
        if [ -d "images" ]; then
          cp -r images pages_build/
          echo "✅ Copied images"
        fi
        
        # Add .nojekyll
        touch pages_build/.nojekyll
        
        echo "📁 Deployment files:"
        ls -la pages_build/

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'pages_build'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Success notification
      run: |
        echo "✅ Successfully deployed to GitHub Pages!"
        echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
