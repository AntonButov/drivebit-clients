<!DOCTYPE html>
<html>
<head>
    <title>Test DriveBit</title>
</head>
<body>
    <h1>Loading...</h1>
    <script src="composeApp.js"></script>
    <script>
        console.log("HTML loaded");
        // Проверяем что наш JS загрузился
        setTimeout(() => {
            console.log("Checking if main function exists...");
            if (typeof window.Drivebitclients === 'undefined') {
                console.log("Drivebitclients not found, trying direct call...");
                // Попробуем вызвать main напрямую
                try {
                    // Ищем функцию main в глобальной области
                    if (typeof main !== 'undefined') {
                        main();
                    } else {
                        console.log("main function not found");
                    }
                } catch (e) {
                    console.error("Error calling main:", e);
                }
            }
        }, 1000);
    </script>
</body>
</html>
